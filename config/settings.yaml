# What counts as a match, and where you get notified.

filters:
  # A job matches if its title contains ANY of these (whole-word, case-insensitive).
  # Tuned for a data / AI / SWE new-grad + internships. Edit freely.
  include_keywords:
    # data / AI / ML
    - data scientist
    - data engineer
    - data science
    - machine learning
    - ml engineer
    - "ai engineer"
    - artificial intelligence
    - analytics engineer
    - data analyst
    - research scientist
    - quant
    - deep learning
    - computer vision
    - nlp
    - mlops
    - data platform
    # software engineering
    - software engineer
    - software developer
    - backend
    - frontend
    - full stack
    - full-stack
    - developer
    - platform engineer
    - cloud engineer
    - infrastructure engineer
    - devops
    - site reliability
    - sre

  # Early-career terms. These do NOT match on their own -- a title must ALSO
  # contain one of `technical_keywords` below. On its own "intern" matches
  # every HR / Law / Media internship a big employer posts (ASML alone floods
  # ~30 of them), which buries the roles you actually want.
  early_career_keywords:
    - intern
    - internship
    - graduate
    - working student
    - traineeship
    - trainee
    - junior
    - "new grad"
    - starter

  # The technical signal that makes an early-career title count. Deliberately
  # software/data-leaning: broad words like "engineering" would re-admit every
  # mechanical and industrial internship.
  technical_keywords:
    - software
    - computer science
    - data
    - machine learning
    - artificial intelligence
    - "ai"
    - "ml"
    - deep learning
    - computer vision
    - nlp
    - analytics
    - algorithm
    - backend
    - front end
    - frontend
    - full stack
    - full-stack
    - developer
    - programming
    - python
    - java
    - "c++"
    - cloud
    - devops
    - sre
    - infrastructure
    - platform
    - database
    - firmware
    - embedded
    - robotics
    - quant
    - cyber
    - security
    # NOTE: do not add "it" here. Matching is case-insensitive, so it matches
    # the pronoun -- "make it happen" would qualify any HR internship.
    - "it security"
    - "it engineer"

  # Drop a job if its title contains ANY of these (seniority filter).
  # Comment out the list to keep all seniorities.
  exclude_keywords:
    - senior
    - staff
    - principal
    - lead
    - head of
    - director
    - manager
    - vp
    - "vice president"

  # A job matches only if its location contains ANY of these
  # (case-insensitive). Leave empty [] to accept every location.
  locations:
    - netherlands
    - amsterdam
    - rotterdam
    - eindhoven
    - utrecht
    - the hague
    - den haag
    - hilversum
    - nijmegen
    # Note: bare "remote" is intentionally omitted -- it would match
    # "Remote - United States". NL-remote roles still match because their
    # location reads "Remote - The Netherlands" (caught by "netherlands").

notifications:
  # Channel: console | telegram | email  (console needs no setup)
  channel: telegram

  telegram:
    # Set via env vars TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID (do not hardcode).
    enabled: false

  email:
    # Set via env vars SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, EMAIL_TO.
    enabled: false
