# --------------------------------------------------------------------------
# BACKLOG: companies whose careers systems resist simple HTTP access.
# Each needs a headless browser or reverse-engineered auth flow (out of scope
# for this lightweight tracker). Status notes for a future push:
#
#   Optiver (S++)   - custom SPA, no public JSON found
#   Google (S++)    - careers is a JS SPA; v3 API deprecated (404)
#   Meta (S++)      - GraphQL POST needs signed doc_id
#   Apple (S++)     - jobs.apple.com API returns 401 (needs CSRF/session)
#   Microsoft (S+)  - gcsservices host unreachable from CI probe
#   Uber (S)        - loadSearchJobsResults returns 403 (bot protection)
#   Tesla (S)       - cua-api returns 403 (Akamai bot protection)
#   ASML (S)        - Workday tenant/site not yet identified
#   Qualcomm (S)    - Workday site name not yet identified (422)
#   Booking.com (A+)- custom system; SmartRecruiters tenant empty
#   Maverick Derivatives, All Options - endpoints not found
