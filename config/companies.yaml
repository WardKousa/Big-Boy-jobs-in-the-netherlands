# Target companies mapped to their hiring platform (ATS).
# tier = prestige/priority from your wishlist (S++ highest). Used to sort alerts
# so the best opportunities appear first.
#
# Supported ats values:
#   greenhouse | lever | ashby | smartrecruiters | recruitee | workday
#   | amazon | atlassian | snap | eightfold

