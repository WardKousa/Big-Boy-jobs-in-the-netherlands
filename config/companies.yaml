# --------------------------------------------------------------------------
# BACKLOG: companies whose careers systems resist simple HTTP access.
# Each needs a headless browser or reverse-engineered auth flow (out of scope
# for this lightweight tracker). Status notes for a future push:
#
#   Apple (S++)     - jobs.apple.com API returns 401 (needs CSRF/session)
#   Qualcomm (S)    - Workday site name not yet identified (422)
#   All Options     - endpoints not found
#
# SOLVED 2026-07-19 (browser network capture):
#   Google -> server-rendered careers HTML, plain GET (fetch_google)
#   Meta -> metacareers GraphQL replayed in-page for the lsd token (fetch_meta)
#   Microsoft -> migrated to Eightfold "pcsx" API (fetch_pcsx)
#   Uber -> loadSearchJobsResults accepts a dummy x-csrf-token (fetch_uber)
#   Just Eat Takeaway, ABB -> Phenom /widgets API (fetch_phenom)
#   Shell -> Workday tenant shell / site shellcareers
#
# SOLVED since this list was written (now in `companies` above):
#   ASML  -> workday tenant asml, site ASMLEXT1
#   Maverick Derivatives -> greenhouse slug maverickderivatives. The board is
#     valid but currently returns zero postings (HTTP 200, total 0); a wrong
#     slug 404s instead, so this is "no openings", not a broken adapter.
#   Optiver -> own API at www.optiver.com/en/api/v1/jobs (from/size paging,
#     size capped at 16 server-side). Found embedded in the careers page HTML.
#   Booking.com -> Jibe board at jobs.booking.com/api/jobs (plain GET JSON;
#     the old "custom system" note was wrong).
#   Tesla -> cua-api works from a real browser only (Akamai TLS/JS check);
#     fetched headless via Playwright, see fetch_tesla in adapters.py.
#   ING -> Radancy platform at careers.ing.com; /en/search-jobs/results
#     answers plain GETs with JSON-wrapped server-rendered HTML.
#   Adidas, Shell, TomTom, IKEA, IBM, ABB, Arcadis, Backbase, Workiva,
#     Huawei, Ortec, SurePrep, Just Eat Takeaway, Personio
#     (2026-07-19 sweep: none answer the 6 standard ATS APIs or reveal a
#     Workday tenant via root redirect. Personio's recruitee board and
#     Uber's SmartRecruiters tenant are sandboxes -- "API Job Musterstr 1" /
#     "Test UAT" -- do not add them.)
#   Dutch banks still open: ABN AMRO, Rabobank (no ATS fingerprint found on
#     werkenbijabnamro.nl / rabobank.jobs -- likely SPAs, need browser probe)
# --------------------------------------------------------------------------
