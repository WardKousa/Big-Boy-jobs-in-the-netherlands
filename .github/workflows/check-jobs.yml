name: Check for new jobs

on:
  schedule:
    # Every 3 hours (UTC). Adjust as you like.
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "What to run"
        type: choice
        default: check
        options:
          - check         # normal run: alert on new jobs
          - test-notify   # send one fake alert to verify secrets

# Allow the workflow to commit updated state back to the repo.
permissions:
  contents: write

# State is committed back to main, so overlapping runs would race on push.
concurrency:
  group: check-jobs
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Tesla (Akamai) and Meta (per-page lsd token) can only be fetched from
      # a real browser; both adapters drive headless Firefox. Without this
      # step those two degrade to warnings and every other company proceeds.
      - name: Install browser for Tesla + Meta
        run: |
          pip install playwright
          python -m playwright install --with-deps firefox

      - name: Run tests
        run: python tests/test_filters.py

      - name: Run job tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ "${{ inputs.mode }}" = "test-notify" ]; then
            python -m jobtracker.run --test-notify
          else
            python -m jobtracker.run
          fi

      # Runs even if delivery failed, so a state change is never lost. On
      # delivery failure the tracker deliberately leaves state unwritten, so
      # there is simply nothing to commit.
      - name: Commit updated state
        if: always() && inputs.mode != 'test-notify'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          if git diff --staged --quiet; then
            echo "No state change."
            exit 0
          fi
          git commit -m "chore: update seen-jobs state [skip ci]"
          # Another run (or a local push) may have landed meanwhile.
          for i in 1 2 3; do
            if git push; then
              echo "Pushed state."
              exit 0
            fi
            echo "Push rejected; rebasing on origin/main and retrying ($i/3)."
            git pull --rebase origin main || exit 1
          done
          echo "Could not push state after 3 attempts." >&2
          exit 1
